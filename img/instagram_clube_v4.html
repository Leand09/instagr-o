<head>
  
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #fafafa; color: #333; }
h1 { text-align: center; padding: 12px; font-size: 22px; border-bottom: 1px solid #ccc; background: white; }

.stories-bar { background: white; border-bottom: 1px solid #ccc; padding: 12px 16px; display: flex; gap: 20px; }
.story-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.story-ring { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #c13584; overflow: hidden; }
.story-avatar { width: 100%; height: 100%; object-fit: cover; display: block; }
.story-name { font-size: 11px; color: #333; }

.post { background: white; border: 1px solid #ccc; margin: 12px auto; max-width: 480px; }
.post-header { display: flex; align-items: center; gap: 10px; padding: 10px; }
.avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid orange; }
.username { font-weight: bold; font-size: 14px; }
.post-img { width: 100%; height: 320px; object-fit: cover; display: block; background: #ddd; }
.post-footer { padding: 10px; }
.btns { display: flex; gap: 10px; margin-bottom: 8px; }
.btns button { background: none; font-size: 13px; cursor: pointer; color: #333; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; }
.btns button:hover { background: #eee; }
.likes { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
.caption { font-size: 13px; margin-bottom: 6px; }
.caption b { margin-right: 5px; }
.comments { font-size: 13px; margin-bottom: 6px; }
.comments div { margin-bottom: 2px; }
.comments b { margin-right: 4px; }
.add-comment { display: flex; gap: 5px; border-top: 1px solid #eee; padding-top: 8px; }
.add-comment input { flex: 1; border: 1px solid #ccc; padding: 5px; font-size: 13px; border-radius: 3px; }
.add-comment button { padding: 5px 10px; background: #0095f6; color: white; border: none; cursor: pointer; font-size: 13px; border-radius: 3px; }
</style>
</head>

<h1>Instagrão</h1>

<div class="stories-bar">
  <div class="story-item">
    <div class="story-ring">
      <img class="story-avatar" src="C:\Users\leand\OneDrive\Desktop\img\tylerperfil.webp">
    </div>
    <span class="story-name">tyler</span>
  </div>
  <div class="story-item">
    <div class="story-ring">
      <img class="story-avatar" src="C:\Users\leand\OneDrive\Desktop\img\marlaperfil.jfif">
    </div>
    <span class="story-name">marla</span>
  </div>
  <div class="story-item">
    <div class="story-ring">
      <img class="story-avatar" src="C:\Users\leand\OneDrive\Desktop\img\bobperfil.jfif">
    </div>
    <span class="story-name">bob</span>
  </div>
</div>

<div id="feed"></div>

<script>
var posts = [
  {
    id: 0,
    user: "tyler.durden",
    avatar: "tylerperfil.webp",
    img: "tylerpub.jpg",
    likes: 612, liked: false,
    caption: "novo sabonete artesanal disponivel!! dm pra encomendar 🧼 #handmade #autocuidado",
    comments: [{u:"marla.s", t:"vc nem dorme e tá fazendo sabonete??"}, {u:"bob_nariz", t:"comprei 3 recomendo"}]
  },
  {
    id: 1,
    user: "marla.singer",
    avatar: "marlaperfil.jfif",
    img: "download.jfif",
    likes: 291, liked: false,
    caption: "com meu namorado #love",
    comments: [{u:"tyler.durden", t:"que cara bonitão"}, {u:"tyler.durden", t:"olha eu ai"}]
  }
];

function render() {
  document.getElementById('feed').innerHTML = posts.map(function(p) {
    return '<div class="post" id="p'+p.id+'">' +
      '<div class="post-header">' +
        '<img class="avatar" src="'+p.avatar+'">' +
        '<div class="username">'+p.user+'</div>' +
      '</div>' +
      '<img class="post-img" src="'+p.img+'">' +
      '<div class="post-footer">' +
        '<div class="btns">' +
          '<button onclick="like('+p.id+')" id="lb'+p.id+'">'+(p.liked?'❤️':'🤍')+' Curtir</button>' +
          '<button>💬 Comentar</button>' +
        '</div>' +
        '<div class="likes" id="lk'+p.id+'">'+p.likes+' curtidas</div>' +
        '<div class="caption"><b>'+p.user+'</b> '+p.caption+'</div>' +
        '<div class="comments" id="cm'+p.id+'">' +
          p.comments.map(function(c){ return '<div><b>'+c.u+'</b> '+c.t+'</div>'; }).join('') +
        '</div>' +
        '<div class="add-comment">' +
          '<input id="in'+p.id+'" placeholder="comentar...">' +
          '<button onclick="addCmt('+p.id+')">ok</button>' +
        '</div>' +
      '</div></div>';
  }).join('');
}

function like(id) {
  var p = posts[id];
  p.liked = !p.liked;
  p.likes += p.liked ? 1 : -1;
  document.getElementById('lb'+id).textContent = (p.liked ? '❤️' : '🤍') + ' Curtir';
  document.getElementById('lk'+id).textContent = p.likes + ' curtidas';
}

function addCmt(id) {
  var inp = document.getElementById('in'+id);
  if (!inp.value.trim()) return;
  document.getElementById('cm'+id).innerHTML += '<div><b>voce</b> '+inp.value+'</div>';
  inp.value = '';
}

render();
</script>
